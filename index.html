<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envision Executive Points Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --navy: #0f172a;
            --bg-soft: #f8fafc;
            --border: #e2e8f0;
            --text-muted: #64748b;
            --thermo-red: #ef4444;
            --success-green: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--navy);
        }

        .dashboard {
            display: flex;
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
        }

        .col { padding: 50px; flex: 1; }
        .col-form { border-right: 1px solid var(--border); }
        .col-stats { background-color: var(--bg-soft); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        h2 { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--navy); margin-bottom: 30px; display: flex; align-items: center; }
        h2::before { content: ""; width: 4px; height: 18px; background: var(--primary); margin-right: 10px; border-radius: 2px; }

        .field { margin-bottom: 22px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        input, select {
            width: 100%; padding: 14px; background: #fff;
            border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px;
            box-sizing: border-box; transition: 0.2s; outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }

        button {
            width: 100%; background: var(--navy); color: white; border: none;
            padding: 18px; border-radius: 14px; font-size: 15px; font-weight: 700;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        button:hover { background: var(--primary); transform: translateY(-1px); }

        .total-amount { font-size: 36px; font-weight: 800; color: var(--navy); margin-bottom: 2px; }
        .goal-subtext { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 40px; }
        .thermo-wrap { position: relative; height: 260px; width: 80px; display: flex; flex-direction: column; align-items: center; }
        .tube { width: 26px; height: 220px; background: #e2e8f0; border-radius: 20px; position: relative; overflow: hidden; border: 4px solid #fff; }
        .fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(to top, var(--thermo-red), #f87171); transition: height 2s cubic-bezier(0.4, 0, 0.2, 1); }
        .bulb { width: 60px; height: 60px; background: var(--thermo-red); border-radius: 50%; margin-top: -30px; border: 5px solid #fff; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 24px; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); z-index: 2; }
        #percentComplete { margin-top: 25px; font-weight: 800; font-size: 16px; color: var(--primary); text-transform: uppercase; }

        #congratsOverlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; text-align: center; padding: 20px; box-sizing: border-box;
            animation: fadeIn 0.5s ease-out; border-radius: 0 32px 32px 0;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .trophy { font-size: 64px; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 24px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        .admin-link { margin-top: 25px; font-size: 11px; color: #94a3b8; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .admin-link:hover { color: var(--navy); }

        @media (max-width: 850px) { .dashboard { flex-direction: column; width: 100%; max-width: 450px; } .col-form { border-right: none; border-bottom: 1px solid var(--border); } #congratsOverlay { border-radius: 0 0 32px 32px; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="col col-form">
        <h2>Points Entry</h2>
        <form id="gfiForm">
            <div class="field"><label>Date</label><input type="date" name="Date" id="dateInput" required></div>
            <div class="field"><label>Agent Name</label><input type="text" name="Agent_Name" id="agentInput" placeholder="Full Name" required></div>
            
            <div class="field">
                <label>Carrier</label>
                <select name="Carrier" required>
                    <option value="" disabled selected>Select Carrier</option>
                    <option value="Corebridge">Corebridge</option>
                    <option value="Ethos">Ethos</option>
                    <option value="American Equity">American Equity</option>
                    <option value="North American">North American</option>
                    <option value="ANICO">ANICO</option>
                    <option value="Foresters">Foresters</option>
                    <option value="Fidelity & Guaranty">Fidelity & Guaranty</option>
                    <option value="Mutual of Omaha">Mutual of Omaha</option>
                </select>
            </div>

            <div class="field">
                <label>Product</label>
                <select name="Product" required>
                    <option value="" disabled selected>Select Product</option>
                    <option value="Indexed UL">Indexed UL</option>
                    <option value="Indexed Annuity">Indexed Annuity</option>
                    <option value="F&G Pathsetter">F&G Pathsetter</option>
                    <option value="Term">Term</option>
                    <option value="IUL">IUL</option>
                </select>
            </div>

            <div class="field">
                <label>Points</label>
                <input type="number" name="Points" step="0.01" placeholder="0.00" required>
            </div>
            
            <button type="submit" id="submitBtn">Submit To Database</button>
        </form>
    </div>

    <div class="col col-stats">
        <div id="congratsOverlay">
            <div class="trophy">🏆</div>
            <h3 style="margin: 0; color: var(--navy); font-weight: 800; font-size: 22px;">GOAL REACHED!</h3>
            <p style="font-size: 14px; color: var(--text-muted); margin: 10px 0 20px;">Outstanding job, Team Envision! You're a Powerhouse! </p>
            <button onclick="hideCongrats()" style="padding: 12px 24px; font-size: 12px; width: auto; background: var(--navy);">View Progress</button>
        </div>

        <div class="progress-box">
            <h2>Goal Points</h2>
            <div class="total-amount" id="currentTotal">0</div>
            <div class="goal-subtext">of <span id="displayGoal">---</span> Target Points</div>
            <div class="thermo-wrap">
                <div class="tube"><div id="barFill" class="fill"></div></div>
                <div class="bulb">P</div>
            </div>
            <div id="percentComplete">0% Complete</div>
        </div>
    </div>
</div>

<div class="admin-link" onclick="openAdmin()">Admin Settings</div>

<div id="successModal" class="modal">
    <div class="modal-content">
        <div style="width: 50px; height: 50px; background: var(--success-green); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 24px;">✓</div>
        <h3>Success!</h3>
        <p>Amazing progress! Keep that momentum going—you’ve got this!</p>
        <button onclick="location.reload()" style="background: var(--navy);">Done</button>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h3>Admin Access</h3>
        <div id="adminLoginArea">
            <div class="field"><label>Password</label><input type="password" id="adminPass"></div>
            <button onclick="checkAdmin()">Login</button>
        </div>
        <div id="adminSettingsArea" style="display:none">
            <div class="field"><label>New Master Goal</label><input type="number" id="newGoalInput" placeholder="e.g. 500000"></div>
            <button id="updateGoalBtn" onclick="saveAdminChanges()">Update Goal For All</button>
        </div>
        <button onclick="closeAdmin()" style="background: #94a3b8; margin-top: 10px;">Cancel</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzhzp_JhS_3sfWgI3Z7wN1AhwP9h5ntzOkaKncLldNKsP7DNMmUa-v-VjxbbpCDmbfrA/exec'; 
    const ADMIN_PASSWORD = "GFI2026";

    window.onload = function() {
        document.getElementById('dateInput').valueAsDate = new Date();
        const savedName = localStorage.getItem('lastAgentName');
        if (savedName) document.getElementById('agentInput').value = savedName;

        fetch(SCRIPT_URL).then(res => res.json()).then(data => {
            const total = data.total || 0;
            const masterGoal = data.goal || 250000;
            
            const pct = Math.min((total / masterGoal) * 100, 100).toFixed(1);
            
            document.getElementById('displayGoal').innerText = Number(masterGoal).toLocaleString();
            document.getElementById('currentTotal').innerText = total.toLocaleString();
            document.getElementById('barFill').style.height = pct + "%";
            document.getElementById('percentComplete').innerText = pct + "% Complete";

            if (total >= masterGoal) {
                document.getElementById('congratsOverlay').style.display = 'flex';
            }
        }).catch(err => console.log("Fetch Error"));
    };

    function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
    function closeAdmin() { 
        document.getElementById('adminModal').style.display = 'none'; 
        document.getElementById('adminLoginArea').style.display = 'block';
        document.getElementById('adminSettingsArea').style.display = 'none';
        document.getElementById('adminPass').value = '';
    }

    function checkAdmin() {
        if(document.getElementById('adminPass').value === ADMIN_PASSWORD) {
            document.getElementById('adminLoginArea').style.display = 'none';
            document.getElementById('adminSettingsArea').style.display = 'block';
        } else { alert("Incorrect Password"); }
    }

    function saveAdminChanges() {
        const newVal = document.getElementById('newGoalInput').value;
        const btn = document.getElementById('updateGoalBtn');
        if(!newVal) return;

        btn.disabled = true; btn.innerText = "Updating Sheet...";

        fetch(SCRIPT_URL + "?updateGoal=" + newVal, { method: 'POST' })
        .then(() => {
            alert("Goal updated successfully for all users!");
            location.reload();
        })
        .catch(err => {
            alert("Error updating goal.");
            btn.disabled = false; btn.innerText = "Update Goal For All";
        });
    }

    function hideCongrats() { document.getElementById('congratsOverlay').style.display = 'none'; }

    document.getElementById('gfiForm').onsubmit = e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        localStorage.setItem('lastAgentName', document.getElementById('agentInput').value);
        btn.disabled = true; btn.innerText = "Saving...";
        
        fetch(SCRIPT_URL, { method: 'POST', body: new FormData(e.target)})
        .then(() => { 
            // FIXED: Corrected style.display typo
            document.getElementById('successModal').style.display = 'flex'; 
        })
        .catch(err => {
            alert("Submission failed.");
            btn.disabled = false; btn.innerText = "Submit To Database";
        });
    };
</script>
</body>
</html>
